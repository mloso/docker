version: "3.8"

services:
  backend:
    image: backend-app
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=postgres
    depends_on:
      - redis
      - postgres
  redis:
    image: redis:latest
    expose:
      - 6379
  postgres:
    image: postgres:13-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
  frontend:
    image: frontend-app
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5000:3000"
